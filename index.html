<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=yes">
    <title>ONLYPANTS | Official Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 인트로 섹션 -->
    <div id="intro" class="section active">
        <div>
            <div class="logo">ONLY<span>PANTS</span></div>
            <button id="playButton" class="btn">온리팬츠 입으러 가기</button>
        </div>
    </div>

    <!-- 비디오 섹션 (video.mp4 상대 경로) -->
    <div id="video-layer" class="section">
        <div class="video-box">
            <video id="mainV" muted playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- 쇼핑몰 섹션 -->
    <div id="shop" class="section">
        <div class="header">
            <div id="homeLogo" class="home-logo">ONLY<span>PANTS</span></div>
            <div class="theme-switch-wrapper">
                <a href="#inquiry" class="nav-link">제휴문의</a>
                <div id="theme-char" class="theme-char"></div>
                <span id="theme-label" class="theme-label">낮져</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider"></div>
                </label>
            </div>
        </div>
        <div class="grid" id="mainGrid"></div>

        <!-- 제휴 문의 섹션 -->
        <section id="inquiry" class="inquiry-section">
            <div class="inquiry-container">
                <h2 class="inquiry-title">PARTNERSHIP <span>INQUIRY</span></h2>
                <p class="inquiry-desc">ONLYPANTS와 함께할 파트너를 찾습니다. 제휴 및 협업 문의를 남겨주세요.</p>
                
                <form id="inquiry-form" action="https://formspree.io/f/xaqvnzqv" method="POST" class="inquiry-form">
                    <div class="form-group">
                        <label for="name">성함 / 업체명</label>
                        <input type="text" id="name" name="name" placeholder="홍길동" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" id="email" name="email" placeholder="example@onlypants.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea id="message" name="message" rows="5" placeholder="협업 제안 내용을 상세히 입력해주세요." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의하기</button>
                    <div id="form-status" class="form-status"></div>
                </form>
            </div>
        </section>

        <footer class="footer">
            <p>&copy; 2024 ONLYPANTS. All Rights Reserved.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
