<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=yes">
    <title>ONLYPANTS | Official Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 인트로 섹션 -->
    <div id="intro" class="section active">
        <div>
            <div class="logo">ONLY<span>PANTS</span></div>
            <button id="playButton" class="btn">온리팬츠 입으러 가기</button>
        </div>
    </div>

    <!-- 비디오 섹션 (video.mp4 상대 경로) -->
    <div id="video-layer" class="section">
        <div class="video-box">
            <video id="mainV" muted playsinline>
                <source src="video.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- 쇼핑몰 섹션 -->
    <div id="shop" class="section">
        <div class="header">
            <div id="homeLogo" class="home-logo">ONLY<span>PANTS</span></div>
        </div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
